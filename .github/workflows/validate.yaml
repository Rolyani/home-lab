name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # 1. Render every Kustomize overlay exactly as Flux would, then schema-validate
  #    the output (core Kubernetes resources + CRDs via the community catalog).
  validate:
    name: Build & schema-validate overlays
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup tools
        run: |
          set -euo pipefail
          KUSTOMIZE_VERSION="5.8.1"
          KUBECONFORM_VERSION="0.7.0"

          curl -sSfL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /tmp kustomize
          sudo install /tmp/kustomize /usr/local/bin/kustomize

          curl -sSfL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /tmp kubeconform
          sudo install /tmp/kubeconform /usr/local/bin/kubeconform

          kustomize version
          kubeconform -v

      - name: Build and validate overlays
        run: |
          set -euo pipefail
          # Build each root overlay; Kustomize recursively pulls in child apps,
          # so new apps under these roots are validated automatically.
          # Add a root here only when you add a whole new environment overlay.
          ROOTS=(
            "apps/staging"
            "infrastructure/controllers/staging"
            "monitoring/configs/staging"
            "monitoring/controllers/staging"
          )
          for root in "${ROOTS[@]}"; do
            echo "::group::Validating $root"
            kustomize build "$root" \
              | kubeconform \
                  -strict \
                  -ignore-missing-schemas \
                  -skip Secret \
                  -schema-location default \
                  -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
                  -summary
            echo "::endgroup::"
          done

  # 2. Fail if any Secret manifest with a committed payload is NOT SOPS-encrypted.
  #    ServiceAccount-token Secrets are skipped: their payload is minted by the
  #    cluster at apply time, so there is nothing to encrypt.
  sops-encrypted:
    name: Verify Secrets are SOPS-encrypted
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check encryption
        run: |
          set -euo pipefail
          SECRET_FILES=$(grep -rl --include="*.yaml" -e "kind: Secret" . || true)
          FAIL=0
          for f in $SECRET_FILES; do
            # Skip SA-token Secrets: cluster-minted payload, nothing to encrypt.
            if grep -q "type: kubernetes.io/service-account-token" "$f"; then
              echo "Skipping SA-token Secret (no payload to encrypt): $f"
              continue
            fi
            if ! grep -q "sops:" "$f"; then
              echo "::error file=$f::Secret is NOT SOPS-encrypted"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then
            echo "One or more Secret manifests are unencrypted."
            echo "Encrypt with: sops --encrypt --in-place <file>"
            exit 1
          fi
          echo "All Secret manifests with a payload are SOPS-encrypted."

  # 3. Scan the full git history for any leaked secret outside the SOPS files.
  #    Encrypted SOPS blobs are allowlisted in .gitleaks.toml.
  gitleaks:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history so previously-committed secrets are still caught

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION="8.30.1"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks (current file contents)
        run: |
          set -euo pipefail
          # 'dir' scans the actual file contents on disk catches any secret
          # present in the repo right now, regardless of commit structure.
          gitleaks dir . \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --exit-code 1

      - name: Run gitleaks (full git history)
        run: |
          set -euo pipefail
          # 'git' scans commit patches across all history catches secrets that
          # were committed and later removed from the working tree.
          gitleaks git . \
            --config .gitleaks.toml \
            --log-opts="--all" \
            --redact \
            --verbose \
            --exit-code 1

  # 4. Catch deprecated Kubernetes/Flux API versions. `flux migrate` rewrites
  #    manifests in place to their current apiVersions; if that produces a diff,
  #    the repo contains deprecated versions that should be migrated and committed.
  #    (Lifted from the official fluxcd/flux2-kustomize-helm-example test.yaml.)
  deprecated-apis:
    name: Check for deprecated API versions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Check API versions
        run: |
          set -euo pipefail
          flux migrate -f . --yes
          if [[ $(git diff --stat) != '' ]]; then
            echo "::error::Deprecated API versions found."
            git --no-pager diff
            echo "Run 'flux migrate -f . --yes' locally and commit the changes."
            exit 1
          fi
          echo "No deprecated API versions found."
