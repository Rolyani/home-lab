apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 15m
  chart:
    spec:
      chart: longhorn
      # Reverted from 1.12.0 to the version actually running in-cluster.
      # jumping 1.6.2 -> 1.12.0 fails the pre-upgrade check. Upgrade stepwise later.
      version: 1.6.2
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  values:
    csi:
      attacherReplicaCount: 1
      provisionerReplicaCount: 1
      resizerReplicaCount: 1
      snapshotterReplicaCount: 1
    defaultSettings:
      defaultDataPath: /var/lib/longhorn
      defaultReplicaCount: 1
      replicaSoftAntiAffinity: true
    persistence:
      defaultClass: false
