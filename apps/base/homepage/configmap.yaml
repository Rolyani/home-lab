apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster

  settings.yaml: |
    title: home-lab
    favicon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/kubernetes.png

    theme: dark
    color: slate
    headerStyle: clean
    hideVersion: true
    statusStyle: dot
    target: _blank

    # Layout controls grouping order, columns, and card style.
    # Order here = order on the page.
    layout:
      Cluster Management:
        style: row
        columns: 3
      Applications:
        style: row
        columns: 3
      Monitoring & Platform:
        style: row
        columns: 3

  widgets.yaml: |
    # Header resource tiles (the live CPU/Mem/Network strip at the top)
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: cluster
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: kubernetes
        expanded: true
        cpu: true
        memory: true
        network: default
    - search:
        provider: duckduckgo
        target: _blank

  services.yaml: |
    - Cluster Management:
        - Homepage:
            icon: homepage.png
            href: https://home.ian-naylor.com
            description: This dashboard
            namespace: homepage
            app: homepage
        - Renovate:
            icon: renovate.png
            href: https://github.com/Rolyani/home-lab/pulls
            description: Automated dependency PRs

    - Applications:
        - Blog — Lessons in Progress:
            icon: si-ghost
            href: https://lessons-in-progress.ian-naylor.com
            description: Go + Nuxt + Laravel blog
            namespace: blog
            app: blog
        - Linkding:
            icon: linkding.png
            href: https://ldhl.ian-naylor.com
            description: Bookmark manager
            namespace: linkding
            app: linkding
        - Mealie:
            icon: mealie.png
            href: https://mealie.ian-naylor.com
            description: Recipe manager
            namespace: mealie
            app: mealie

    - Monitoring & Platform:
        - Grafana:
            icon: grafana.png
            href: https://grs.ian-naylor.com
            description: Dashboards & metrics
            namespace: monitoring
            app: grafana
            widget:
              type: grafana
              url: https://grs.ian-naylor.com

  bookmarks.yaml: |
    - Blog:
        - Lessons in Progress:
            - abbr: LP
              href: https://lessons-in-progress.ian-naylor.com
    - Developer:
        - home-lab Repo:
            - abbr: GH
              href: https://github.com/Rolyani/home-lab
        - Flux Pulls:
            - abbr: FL
              href: https://github.com/Rolyani/home-lab/pulls
    - Docs:
        - Homepage Docs:
            - abbr: HP
              href: https://gethomepage.dev
        - Flux CD:
            - abbr: FX
              href: https://fluxcd.io

  docker.yaml: ""
  custom.css: ""
  custom.js: ""
